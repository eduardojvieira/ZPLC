name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./docs
        run: bun install

      - name: Build website (includes link checking)
        working-directory: ./docs
        # onBrokenLinks=throw is set in docusaurus.config.js, so this fails if links are broken
        run: |
          bun run validate:v1.5-docs
          bun run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push'
        with:
          path: docs/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
