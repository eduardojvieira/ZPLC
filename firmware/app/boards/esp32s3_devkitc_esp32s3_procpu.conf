# =============================================================================
# ZPLC Board Configuration - ESP32-S3 DevKitC (LilyGo T-Display S3 target)
# =============================================================================
# SPDX-License-Identifier: MIT
# =============================================================================

# Enable USB Serial/JTAG Console
CONFIG_UART_CONSOLE=y
CONFIG_USB_DEVICE_STACK=n

# Use the built-in USB-Serial/JTAG controller
# This is handled primarily by Devicetree in Zephyr 4.0

# Flash and NVS for persistence
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# =============================================================================
# Stack / Memory sizes
# =============================================================================
CONFIG_MAIN_STACK_SIZE=3072
CONFIG_IDLE_STACK_SIZE=1024
CONFIG_SHELL_STACK_SIZE=3072
CONFIG_SHELL_CMD_BUFF_SIZE=1024
CONFIG_SHELL_PRINTF_BUFF_SIZE=1024
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=1024

# Reduce TLS/Network buffers to save internal DRAM
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096
CONFIG_NET_TX_STACK_SIZE=1200
CONFIG_NET_RX_STACK_SIZE=1200

# net_mgmt event thread stack: default 2048 is too small under WiFi load.
# Bumped to 4096 following Zephyr WiFi sample recommendations.
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096

# =============================================================================
# PSRAM — LilyGo T-Display S3 (ESP32-S3R8): 8MB Octal PSRAM
# =============================================================================
# The T-Display S3 uses the ESP32-S3R8 SiP with 8MB Octal PSRAM.
# Enabling SPIRAM is REQUIRED for stable WiFi: the ESP WiFi library calls
# wifi_malloc() from interrupt context during WPA2-PSK CCMP/EAPOL handshake
# and needs ~40KB heap. With only internal DRAM available (DRAM is 98%+ full),
# heap allocation fails and corrupts z_swap's _current_cpu pointer, causing
# EXCCAUSE 28 (load prohibited) in the net_mgmt thread.
# With SPIRAM enabled, k_heap and k_malloc route through the shared SPIRAM heap.
CONFIG_ESP_SPIRAM=y
CONFIG_SPIRAM_MODE_OCT=y
CONFIG_ESP_SPIRAM_HEAP_SIZE=1048576

# Route WiFi driver heap allocations through smh_malloc (SPIRAM shared multi-heap).
# Without this, wifi_malloc() uses k_malloc (DRAM) and crashes during WPA2 handshake.
CONFIG_ESP_WIFI_HEAP_SPIRAM=y
# Allocate WiFi + NET stack memory from SPIRAM to free DRAM.
CONFIG_ESP32_WIFI_NET_ALLOC_SPIRAM=y

# Internal heap: keep small since WiFi/TLS heap lives in SPIRAM.
CONFIG_HEAP_MEM_POOL_SIZE=8192
# MbedTLS heap lives in SPIRAM via shared multi-heap. Reduce internal to minimum.
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# =============================================================================
# Flash/settings persistence via LittleFS
# =============================================================================
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FILE=y
CONFIG_SETTINGS_FILE_PATH="/lfs/settings"

# =============================================================================
# Networking (Wi-Fi + TCP/IP)
# =============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=3000

# Wi-Fi shell/runtime management
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
CONFIG_WIFI_CREDENTIALS_SHELL=y

# =============================================================================
# MQTT + TLS
# =============================================================================
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_LIB_WEBSOCKET=y
CONFIG_MQTT_LIB_TLS_USE_ALPN=y
CONFIG_MQTT_VERSION_5_0=y
CONFIG_MQTT_USER_PROPERTIES_MAX=1
CONFIG_MQTT_CLEAN_SESSION=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_WEBSOCKET_CLIENT=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=n
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y

# Sparkplug B / Protobuf support
CONFIG_NANOPB=y

# =============================================================================
# ZPLC Memory Tuning for ESP32-S3 DRAM constraints
# =============================================================================
# The ESP32-S3 internal DRAM is shared with Wi-Fi + TLS static buffers (~200KB).
# Reduce ZPLC static buffers to the minimum needed for HIL testing.
# These are ZPLC module Kconfig symbols (defined in firmware/zephyr/Kconfig).
CONFIG_ZPLC_WORK_MEMORY_SIZE=2048
CONFIG_ZPLC_RETAIN_MEMORY_SIZE=1024
CONFIG_ZPLC_CODE_SIZE_MAX=8192
CONFIG_ZPLC_STACK_DEPTH=64
CONFIG_ZPLC_CALL_STACK_DEPTH=16

# =============================================================================
# SNTP Time Synchronization (ESP32-S3 board override)
# =============================================================================
# SNTP uses CONFIG_SNTP=y + CONFIG_NET_SNTP=y from prj.conf.
# DNS_RESOLVER is already enabled above — no extra board-level config required.
# The SNTP request timeout is controlled at runtime via zplc_config_get_ntp_server().
