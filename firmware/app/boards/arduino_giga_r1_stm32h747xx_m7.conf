# =============================================================================
# ZPLC Board Configuration - Arduino GIGA R1 (STM32H747 M7)
# =============================================================================
# SPDX-License-Identifier: MIT
#
# Board-specific Kconfig settings for Arduino GIGA R1 (M7 core).
# =============================================================================

# Console over USB CDC ACM
# Disable legacy USB device stack because Zephyr board defaults already pull
# device_next paths, and enabling both causes duplicate CDC ACM symbols.
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_PRODUCT="ZPLC Runtime"

# Flash/settings persistence via LittleFS file backend
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FILE=y
CONFIG_SETTINGS_FILE_PATH="/lfs/settings"

# LittleFS + TLS certificate buffers
CONFIG_HEAP_MEM_POOL_SIZE=12288

# Memory sizes
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072

# Networking / Wi-Fi / MQTT are intentionally disabled for this board build.
# Zephyr 4.3.0 board docs for Arduino GIGA R1 state that only Bluetooth is
# currently supported for the onboard Murata Type 1DX radio. Enabling Wi-Fi
# pulls in unsupported Infineon WHD SDIO paths and breaks cross-build parity.
CONFIG_NETWORKING=n
CONFIG_DNS_RESOLVER=n
CONFIG_WIFI=n
CONFIG_NET_L2_WIFI_SHELL=n
CONFIG_NET_SHELL=n
CONFIG_WIFI_CREDENTIALS=n
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=n
CONFIG_WIFI_CREDENTIALS_SHELL=n
CONFIG_MQTT_LIB=n
CONFIG_MQTT_LIB_TLS=n
CONFIG_MQTT_LIB_WEBSOCKET=n
CONFIG_MQTT_LIB_TLS_USE_ALPN=n
CONFIG_MQTT_VERSION_5_0=n
CONFIG_NET_SOCKETS_SOCKOPT_TLS=n
CONFIG_WEBSOCKET_CLIENT=n
CONFIG_TLS_CREDENTIALS=n
CONFIG_MBEDTLS=n
CONFIG_NANOPB=n
