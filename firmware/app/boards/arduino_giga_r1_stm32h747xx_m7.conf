# =============================================================================
# ZPLC Board Configuration - Arduino GIGA R1 (STM32H747 M7)
# =============================================================================
# SPDX-License-Identifier: MIT
#
# Board-specific Kconfig settings for Arduino GIGA R1 (M7 core).
# =============================================================================

# Console over USB CDC ACM
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="ZPLC Runtime"

# Flash/settings persistence via LittleFS file backend
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FILE=y
CONFIG_SETTINGS_FILE_PATH="/lfs/settings"

# LittleFS + TLS certificate buffers
CONFIG_HEAP_MEM_POOL_SIZE=12288

# Memory sizes
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072

# Networking (Wi-Fi first)
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=3000

# Wi-Fi shell/runtime management (credentials provisioned at runtime)
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
CONFIG_WIFI_CREDENTIALS_SHELL=y

# MQTT + TLS
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_LIB_WEBSOCKET=y
CONFIG_MQTT_LIB_TLS_USE_ALPN=y
CONFIG_MQTT_VERSION_5_0=y
CONFIG_MQTT_USER_PROPERTIES_MAX=1
CONFIG_MQTT_CLEAN_SESSION=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_WEBSOCKET_CLIENT=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=n
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y

# Sparkplug B / Protobuf support
CONFIG_NANOPB=y
