# =============================================================================
# ZPLC Board Configuration - STM32 Nucleo-H743ZI
# =============================================================================
# SPDX-License-Identifier: MIT
#
# Board-specific Kconfig settings for the STM32 Nucleo-H743ZI.
# Use the ST-LINK VCP on USART3 for console/shell and internal flash
# `storage_partition` for LittleFS-backed settings persistence.
# =============================================================================

# Console / shell over ST-LINK VCP (USART3 default in upstream board DTS)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Flash/settings persistence via LittleFS on the board's storage_partition.
# NVS is not suitable here because the H743 internal flash erase size is 128 KB,
# which exceeds the UINT16_MAX sector size limit in Zephyr's NVS backend.
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FILE=y
CONFIG_SETTINGS_FILE_PATH="/lfs/settings"

# Heap / stacks
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072

# Analog inputs are available on the board headers
CONFIG_ADC=y

# Ethernet networking (LAN8742 RMII path exposed by board DTS)
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_ICMPV4_ACCEPT_BROADCAST=y
CONFIG_NET_IPV4_AUTO=n

# Random MAC / network helper support
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Time synchronization and hostname/DNS-based clients
CONFIG_SNTP=y
CONFIG_POSIX_TIMERS=y
CONFIG_POSIX_API=y
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"
CONFIG_NET_SOCKETS_DNS_TIMEOUT=3000

# Static IPv4 fallback when DHCP is unavailable
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.179.210"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.179.1"
CONFIG_NET_CONFIG_INIT_TIMEOUT=5

# MQTT + TLS + Sparkplug support
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_LIB_WEBSOCKET=y
CONFIG_MQTT_LIB_TLS_USE_ALPN=y
CONFIG_MQTT_VERSION_5_0=y
CONFIG_MQTT_USER_PROPERTIES_MAX=1
CONFIG_MQTT_CLEAN_SESSION=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_WEBSOCKET_CLIENT=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=n
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y
CONFIG_NANOPB=y
