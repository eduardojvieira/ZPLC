# =============================================================================
# ZPLC Board Configuration - STM32F746G Discovery
# =============================================================================
# SPDX-License-Identifier: MIT
#
# Board-specific Kconfig settings for the STM32F746G-DISCO.
# These override or extend the base prj.conf settings.
# =============================================================================

# ST-LINK VCP is kept on USART1 for console/shell.
# Production-style Modbus RTU uses USART6 on the Arduino header.
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="ZPLC Runtime"
CONFIG_USB_DEVICE_VID=0x0483
CONFIG_USB_DEVICE_PID=0x5740
CONFIG_UART_INTERRUPT_DRIVEN=y

# Flash and settings persistence via LittleFS on external QSPI NOR flash.
#
# CONFIG_SETTINGS_NVS is NOT used: NVS requires flash sector size <= UINT16_MAX
# (64KB), but the STM32F746 internal flash has 256KB sectors which cause
# settings_backend_init() to return -EDOM (-33). The QSPI storage_partition
# has the same constraint on its 256KB erase blocks.
#
# LittleFS + SETTINGS_FILE works correctly with any erase block size.
# The filesystem is mounted by zplc_config_init() before settings_subsys_init().
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FILE=y
CONFIG_SETTINGS_FILE_PATH="/lfs/settings"
# LittleFS needs a heap for internal allocation
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Memory sizes (F746 has more resources)
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Enable ADC for analog inputs
CONFIG_ADC=y

# =============================================================================
# Networking Foundation (Phase 1.4.1)
# =============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y

# IPv4
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y

# Sockets
CONFIG_NET_SOCKETS=y

# Protocols
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y

# Helper macros
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

# Ping response
CONFIG_NET_ICMPV4_ACCEPT_BROADCAST=y

# DISABLE link-local/APIPA fallback (RFC 3927).
# With NET_IPV4_AUTO=y, when DHCP fails Zephyr falls back to a 169.254.x.x
# address which has no default gateway — breaking all external connectivity.
# We use NET_CONFIG_SETTINGS for a static fallback IP instead.
CONFIG_NET_IPV4_AUTO=n

# Random MAC address generation
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Time Synchronization
CONFIG_SNTP=y
CONFIG_POSIX_TIMERS=y
CONFIG_POSIX_API=y

# DNS Resolver (Required for MQTT broker resolution)
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"
CONFIG_NET_SOCKETS_DNS_TIMEOUT=3000

# Static IP fallback via net_config subsystem.
#
# NET_CONFIG_NEED_IPV4 activates the auto_init path in net_config/init.c,
# which sets the static address as NET_ADDR_OVERRIDABLE and registers the
# DHCP event callback. If DHCP succeeds it overrides the static IP; if it
# fails (or is absent) the static address is used as-is.
#
# Without NET_CONFIG_NEED_IPV4, the NET_CONFIG_MY_IPV4_ADDR string is
# compiled in but the net_config init path is never triggered, so the
# static address is never assigned to the interface.
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.179.200"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.179.1"
CONFIG_NET_CONFIG_INIT_TIMEOUT=5

# Modbus and MQTT Libraries
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_LIB_WEBSOCKET=y
CONFIG_MQTT_LIB_TLS_USE_ALPN=y
CONFIG_MQTT_VERSION_5_0=y
CONFIG_MQTT_USER_PROPERTIES_MAX=1
CONFIG_MQTT_CLEAN_SESSION=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_WEBSOCKET_CLIENT=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=n
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y

# Sparkplug B / Protobuf support
CONFIG_NANOPB=y
